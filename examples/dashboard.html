<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <nav class="sidebar">
    <h2>MyApp</h2>
    <ul>
      <li><a href="/">Dashboard</a></li>
      <li><a href="/users">Users</a></li>
      <li><a href="/settings">Settings</a></li>
    </ul>
  </nav>

  <main class="main-content">
    <header class="topbar">
      <h1>Dashboard</h1>
      <div class="user-info">
        <span>John Doe</span>
      </div>
    </header>

    <section class="stats">
      <div class="card">
        <h3>Revenue</h3>
        <p class="value">$12,345</p>
        <p class="trend up">+12%</p>
      </div>
      <div class="card">
        <h3>Users</h3>
        <p class="value">1,234</p>
        <p class="trend up">+8%</p>
      </div>
      <div class="card">
        <h3>Orders</h3>
        <p class="value">456</p>
        <p class="trend down">-3%</p>
      </div>
      <div class="card">
        <h3>Traffic</h3>
        <p class="value">89.2k</p>
        <p class="trend up">+23%</p>
      </div>
    </section>

    <footer class="footer">
      <p>&copy; 2026 MyApp. All rights reserved.</p>
    </footer>
  </main>
</body>
</html>
